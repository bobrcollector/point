services:
  db:
    image: postgis/postgis:16-3.4
    container_name: point_db
    environment:
      POSTGRES_DB: point
      POSTGRES_USER: point
      POSTGRES_PASSWORD: point
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - point_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U point -d point"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  point_db_data:

